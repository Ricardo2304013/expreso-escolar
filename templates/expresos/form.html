{% extends 'base.html' %}
{% block title %}{{ titulo }} - Expreso Escolar{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="card" style="max-width:600px; margin:0 auto">
  <div class="card-header"><span class="card-title">🚌 {{ titulo }}</span></div>
  <form method="post">
    {% csrf_token %} <!-- ¡IMPORTANTE! Protección contra ataques CSRF -->
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Nombre del Expreso</label>
        {{ form.nombre }}
      </div>
      <div class="form-group">
        <label class="form-label">Placa del Vehículo</label>
        {{ form.placa }}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Capacidad Máxima</label>
      {{ form.capacidad }}
    </div>
    <div class="form-group">
      <label class="form-label">Transportista Asignado</label>
      {{ form.transportista }}
    </div>
    <div class="form-group">
      <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer">
        {{ form.activo }} <span class="form-label" style="margin:0">Expreso Activo</span>
      </label>
    </div>
    <div class="flex gap-2" style="margin-top:1.5rem">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{% url 'lista_expresos' %}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
