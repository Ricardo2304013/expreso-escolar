<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión - Expreso Escolar</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="bus-icon">🚌</div>
      <h1>Expreso Escolar</h1>
      <p>Sistema de Gestión de Transporte Escolar</p>
    </div>
    {% if form.errors %}
    <div class="alert alert-error">❌ Correo o contraseña incorrectos.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="text" name="username" class="form-control" placeholder="correo@ejemplo.com" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:1rem">Ingresar</button>
    </form>
    <div style="text-align:center; margin-top:1.25rem; color:#64748b; font-size:0.875rem">
      ¿No tienes cuenta?
      <a href="{% url 'registro' %}" style="color:var(--primary); font-weight:600">Regístrate aquí</a>
    </div>
  </div>
</div>
</body>
</html>
